# 1. BẮT BUỘC phải có khối events này
events {
    worker_connections 1024;
}

http {
    # 2. Định nghĩa cụm Server (Upstream) để đảm bảo Availability 24/24
    upstream my_app_cluster {
        # Thuật toán Round Robin mặc định
        server 127.0.0.1:3001; 
        server 127.0.0.1:3002;
    }

    server {
        listen 80; # Cổng công khai cho người dùng truy cập
        server_name localhost;

        location / {
            proxy_pass http://my_app_cluster;
            
            # 3. Hiện thực hóa "Fault Tolerance" từ hình vẽ của bạn
            # Nếu server die hoặc phản hồi chậm (timeout), tự chuyển sang máy khác
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            
            # Thời gian chờ kết nối tối đa 2 giây trước khi xác định server lỗi
            proxy_connect_timeout 2s;
            
            # Giữ nguyên thông tin IP người dùng để phục vụ "Sercu data" (Bảo mật dữ liệu)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}